- name: Install T-Pot
  hosts: tpot
  become: true
  vars:
    tpot_repo_url: "{{ lookup('env', 'GITHUB_URL') }}"
    tpot_path: "{{ lookup('env', 'DEPLOY_PATH') }}"

  tasks:
    - name: Clone T-Pot repository as deployer
      git:
        repo: "{{ tpot_repo_url }}"
        dest: "{{ tpot_path }}"
        update: yes
        force: true
      become_user: deployer

    - name: Run installer as deployer
      command: ./install.sh -s -t l -u webuser -p w3b$ecret
      args:
        chdir: "{{ tpot_path }}"
      become_user: deployer
      changed_when: true

    - name: Reboot after install
      shell: sleep 5 && reboot
      async: 1
      poll: 0
      ignore_errors: true

    - name: Wait for old SSH port 22 to go down
      wait_for:
        host: "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"
        port: 22
        state: drained
        timeout: 300
      delegate_to: localhost
      ignore_errors: true
    - name: Wait for new SSH port 64295 to come up
      wait_for:
        host: "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"
        port: 64295
        state: started
        timeout: 900
      delegate_to: localhost

    - name: Remove stale SSH host key (hostname)
      shell: ssh-keygen -f /root/.ssh/known_hosts -R {{ inventory_hostname }}
      delegate_to: localhost
      ignore_errors: true
      changed_when: false

    - name: Remove stale SSH host key (IP)
      shell: ssh-keygen -f /root/.ssh/known_hosts -R {{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}
      delegate_to: localhost
      ignore_errors: true
      changed_when: false

    - name: Add new SSH host key for port 64295
      shell: >
        ssh-keyscan -p 64295
        {{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}
        >> /root/.ssh/known_hosts
      delegate_to: localhost
      changed_when: false

    - name: Force Ansible to use new SSH port after install
      set_fact:
        ansible_port: 64295
        ansible_ssh_common_args: >-
          -o UserKnownHostsFile=/root/.ssh/known_hosts
          -o StrictHostKeyChecking=yes
          -o PreferredAuthentications=publickey
          -o PasswordAuthentication=no

    - name: Reset SSH connection
      meta: reset_connection

    - name: Wait for SSH on new port
      wait_for_connection:
        timeout: 600

    - name: Wait for Elasticsearch to be healthy
      shell: docker inspect --format='{{ "{{.State.Health.Status}}" }}' elasticsearch
      register: es_health
      retries: 40
      delay: 15
      until: es_health.stdout == "healthy"
      changed_when: false

    - name: Wait for Kibana to be healthy
      shell: docker inspect --format='{{ "{{.State.Health.Status}}" }}' kibana
      register: kibana_health
      retries: 40
      delay: 15
      until: kibana_health.stdout == "healthy"
      changed_when: false

    - name: Wait for first logstash index
      shell: "curl -s http://127.0.0.1:64298/_cat/indices | grep logstash-"
      register: logstash_index
      retries: 20
      delay: 15
      until: logstash_index.rc == 0
      changed_when: false

