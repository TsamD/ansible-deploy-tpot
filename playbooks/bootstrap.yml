- name: Bootstrap target
  hosts: tpot
  become: true

  tasks:
    - name: Install base packages
      apt:
        name:
          - git
          - curl
          - ca-certificates
          - tree
        state: present
        update_cache: true

    - name: Ensure /opt exists
      file:
        path: /opt
        state: directory
        mode: "0755"

    - name: Create deploy user
      user:
        name: deployer
        shell: /bin/bash
        create_home: true

    - name: Add deploy user to sudo group
      user:
        name: deployer
        groups: sudo
        append: true

    - name: Allow passwordless sudo for deploy user
      copy:
        dest: /etc/sudoers.d/deployer
        content: "deployer ALL=(ALL) NOPASSWD:ALL\n"
        mode: "0440"

    - name: Create .ssh directory for deploy user
      file:
        path: /home/deployer/.ssh
        state: directory
        owner: deployer
        group: deployer
        mode: "0700"

    - name: Copy authorized_keys from root to deploy user
      copy:
        src: /root/.ssh/authorized_keys
        dest: /home/deployer/.ssh/authorized_keys
        remote_src: true
        owner: deployer
        group: deployer
        mode: "0600"
